# NCII Shield Discovery Templates
# Each template has:
# - id: unique identifier
# - category: classification of the dork type
# - query_pattern: template with {placeholders}
# - placeholders: list of required placeholders
# - engines: list of compatible search engines
# - risk_level: low/medium/high (determines if admin approval needed)

templates:
  # Name-based searches
  - id: exact_name_search
    category: name_variants
    query_pattern: '"{first_name} {last_name}"'
    placeholders: [first_name, last_name]
    engines: [bing, serper-google, yandex]
    risk_level: low

  - id: name_with_location
    category: name_variants
    query_pattern: '"{first_name} {last_name}" {city}'
    placeholders: [first_name, last_name, city]
    engines: [bing, serper-google, yandex]
    risk_level: low

  - id: name_leaked_content
    category: name_variants
    query_pattern: '"{first_name} {last_name}" (leaked OR exposed OR private)'
    placeholders: [first_name, last_name]
    engines: [bing, serper-google, yandex]
    risk_level: medium

  - id: name_explicit_adult_terms
    category: explicit_terms
    query_pattern: '"{first_name} {last_name}" (nude OR nudes OR naked OR porn OR sex OR xxx OR sextape)'
    placeholders: [first_name, last_name]
    engines: [bing, serper-google, yandex]
    risk_level: high

  - id: name_ncII_terms
    category: explicit_terms
    query_pattern: '"{first_name} {last_name}" ("revenge porn" OR "leaked nudes" OR "private video" OR "onlyfans leak")'
    placeholders: [first_name, last_name]
    engines: [bing, serper-google, yandex]
    risk_level: high

  # Handle/username searches
  - id: exact_handle_search
    category: handle_variants
    query_pattern: '"{handle}"'
    placeholders: [handle]
    engines: [bing, serper-google, yandex]
    risk_level: low

  - id: handle_with_platform
    category: handle_variants
    query_pattern: 'site:{platform}.com "{handle}"'
    placeholders: [handle, platform]
    engines: [bing, serper-google]
    risk_level: low

  - id: handle_adult_platforms
    category: handle_variants
    query_pattern: '"{handle}" (onlyfans OR fansly OR manyvids OR chaturbate)'
    placeholders: [handle]
    engines: [bing, yandex]
    risk_level: medium

  - id: handle_explicit_adult_terms
    category: explicit_terms
    query_pattern: '"{handle}" (nude OR nudes OR naked OR porn OR sex OR xxx OR sextape OR leaked)'
    placeholders: [handle]
    engines: [bing, serper-google, yandex]
    risk_level: high

  - id: handle_ncII_terms
    category: explicit_terms
    query_pattern: '"{handle}" ("revenge porn" OR "leaked nudes" OR "private video" OR "onlyfans leak")'
    placeholders: [handle]
    engines: [bing, serper-google, yandex]
    risk_level: high

  # Filetype-specific leaks
  - id: image_files_name
    category: filetype_leaks
    query_pattern: 'filetype:(jpg OR jpeg OR png OR gif) "{first_name} {last_name}"'
    placeholders: [first_name, last_name]
    engines: [bing, serper-google]
    risk_level: medium

  - id: video_files_name
    category: filetype_leaks
    query_pattern: 'filetype:(mp4 OR avi OR mov OR wmv) "{first_name}"'
    placeholders: [first_name]
    engines: [bing, serper-google]
    risk_level: medium

  - id: archive_files_handle
    category: filetype_leaks
    query_pattern: 'filetype:(zip OR rar OR 7z) "{handle}"'
    placeholders: [handle]
    engines: [bing, serper-google]
    risk_level: high

  # Leak site patterns
  - id: anonfiles_search
    category: leak_site_patterns
    query_pattern: 'site:anonfiles.com "{handle}"'
    placeholders: [handle]
    engines: [bing, serper-google]
